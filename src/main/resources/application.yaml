spring:
  application:
    name: feedback360
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:feedback360}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:Rime2006}
  jpa:
    hibernate:
      ddl-auto: validate   # schema is owned by Flyway, never by Hibernate auto-DDL
    open-in-view: false
    properties:
      hibernate.format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${SMTP_HOST:smtp.sendgrid.net}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:apikey}
    password: ${SMTP_PASSWORD:} # intentionally blank — set via env var, never committed
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:8081}

logging:
  level:
    com.feedback.feedback360: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-change-me-please-32chars+}
    expiration-minutes: 480
  mail:
    impl: ${MAIL_IMPL:smtp}
    from: ${MAIL_FROM_ADDRESS:noreply@feedback360.local}
    from-name: ${MAIL_FROM_NAME:Feedback360}
  talentup:
    base-url: ${TALENTUP_BASE_URL:http://localhost:8081/mock-talentup}
    poll-cron: ${TALENTUP_POLL_CRON:0 */30 * * * *}
  reminders:
    cron: ${REMINDER_CRON:0 0 8 * * *}
  feedback:
    base-url: ${FEEDBACK_BASE_URL:http://localhost:4200/feedback/submit}
